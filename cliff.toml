# git-cliff ~ NoBuf configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to NoBuf will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    # Conventional commit format
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore|^ci", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
    # Skip noisy commits (must come BEFORE general verb patterns)
    { message = "^Update.*README", skip = true },
    { message = "^Update.*\\.(tsx|ts|jsx|js|css|html|rs|toml|yaml|json|md)$", group = "Enhancements" },
    { message = "^Bump version", skip = true },
    { message = "^Release v", skip = true },
    { message = "^[Vv]\\d+\\.\\d+", skip = true },
    { message = "^Merge (branch|pull request)", skip = true },
    # Copilot / GitHub Desktop style patterns
    { message = "^Add|^Create|^Implement|^Introduce", group = "Features" },
    { message = "^Fix|^Resolve|^Repair|^Restore", group = "Bug Fixes" },
    { message = "^Update|^Modify|^Change", group = "Enhancements" },
    { message = "^Improve|^Optimize|^Enhance|^Refine|^Tweak", group = "Performance" },
    { message = "^Remove|^Delete|^Drop|^Clean", group = "Removed" },
    { message = "^Rename|^Move|^Reorder|^Reorganize", group = "Refactor" },
    { message = "^Bump|^Release|^Prepare", group = "Miscellaneous Tasks" },
    # Fallback for anything else
    { message = ".*", group = "Other" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
